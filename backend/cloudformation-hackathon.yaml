AWSTemplateFormatVersion: '2010-09-09'
Description: 'AI Visual Shopping - Demo/Hackathon Optimized Configuration'

Parameters:
  Environment:
    Type: String
    Default: 'hackathon'
    AllowedValues: ['hackathon', 'dev']
    Description: Environment name
  
  OpenSearchDomainName:
    Type: String
    Default: 'ai-shopping-opensearch-hack'
    Description: OpenSearch domain name

Resources:
  # S3 Bucket for product images - Free Tier eligible
  ProductImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ai-shopping-catalog-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: ['GET', 'PUT', 'POST', 'DELETE', 'OPTIONS']
            AllowedOrigins: ['*']
            MaxAge: 3600

  # S3 Bucket for user uploads - Free Tier eligible
  UserUploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ai-shopping-uploads-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: ['GET', 'PUT', 'POST', 'DELETE', 'OPTIONS']
            AllowedOrigins: ['*']
            MaxAge: 3600

  # OpenSearch Domain - Cost optimized for hackathon
  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: !Ref OpenSearchDomainName
      EngineVersion: 'OpenSearch_2.5'
      ClusterConfig:
        InstanceCount: 1
        InstanceType: 't3.small.search'  # Smallest instance for cost savings
        DedicatedMasterEnabled: false
        WarmEnabled: false
        ZoneAwarenessEnabled: false
      EBSOptions:
        EBSEnabled: true
        VolumeSize: 10  # Minimal storage for demo
        VolumeType: 'gp3'
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt OpenSearchAccessRole.Arn
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${OpenSearchDomainName}/*'
      NodeToNodeEncryptionOptions:
        Enabled: true
      EncryptionAtRestOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true

  # IAM Role for Lambda functions
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ai-shopping-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ProductImagesBucket.Arn
                  - !Sub '${ProductImagesBucket}/*'
                  - !GetAtt UserUploadsBucket.Arn
                  - !Sub '${UserUploadsBucket}/*'
        - PolicyName: OpenSearchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - es:ESHttpPost
                  - es:ESHttpPut
                  - es:ESHttpGet
                  - es:ESHttpDelete
                Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${OpenSearchDomainName}/*'

  # IAM Role for OpenSearch access
  OpenSearchAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ai-shopping-opensearch-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: es.amazonaws.com
            Action: sts:AssumeRole

  # Lambda function for image search - Optimized for cost
  ImageSearchFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-shopping-image-search-${Environment}'
      Runtime: python3.11
      Handler: image_search.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15  # Reduced timeout for cost savings
      MemorySize: 256  # Reduced memory for demo usage
      Environment:
        Variables:
          OPENSEARCH_ENDPOINT: !GetAtt OpenSearchDomain.DomainEndpoint
          OPENSEARCH_INDEX: products
          PRODUCT_IMAGES_BUCKET: !Ref ProductImagesBucket
          USER_UPLOADS_BUCKET: !Ref UserUploadsBucket
          REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Image search function placeholder'
              }

  # Lambda function for generating explanations - Optimized for cost
  GenerateExplanationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-shopping-generate-explanation-${Environment}'
      Runtime: python3.11
      Handler: generate_explanation.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15  # Reduced timeout for cost savings
      MemorySize: 256  # Reduced memory for demo usage
      Environment:
        Variables:
          REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Generate explanation function placeholder'
              }

  # API Gateway - Free Tier eligible
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'ai-shopping-api-${Environment}'
      Description: 'API for AI Visual Shopping Hackathon'

  # API Gateway Resources
  SearchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'search'

  ExplainResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'explain'

  # API Gateway Methods
  SearchMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref SearchResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ImageSearchFunction.Arn}/invocations'

  ExplainMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ExplainResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GenerateExplanationFunction.Arn}/invocations'

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - SearchMethod
      - ExplainMethod
    Properties:
      RestApiId: !Ref ApiGateway

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment

  # Lambda API Gateway Permission
  ImageSearchApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ImageSearchFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/${Environment}/POST/search'

  GenerateExplanationApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GenerateExplanationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/${Environment}/POST/explain'

Outputs:
  ProductImagesBucketName:
    Description: 'S3 bucket for product images'
    Value: !Ref ProductImagesBucket
    Export:
      Name: !Sub '${AWS::StackName}-ProductImagesBucket'

  UserUploadsBucketName:
    Description: 'S3 bucket for user uploads'
    Value: !Ref UserUploadsBucket
    Export:
      Name: !Sub '${AWS::StackName}-UserUploadsBucket'

  OpenSearchDomainEndpoint:
    Description: 'OpenSearch domain endpoint'
    Value: !GetAtt OpenSearchDomain.DomainEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-OpenSearchEndpoint'

  ApiGatewayUrl:
    Description: 'API Gateway URL'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayUrl'

  ImageSearchFunctionName:
    Description: 'Image search Lambda function name'
    Value: !Ref ImageSearchFunction
    Export:
      Name: !Sub '${AWS::StackName}-ImageSearchFunction'

  GenerateExplanationFunctionName:
    Description: 'Generate explanation Lambda function name'
    Value: !Ref GenerateExplanationFunction
    Export:
      Name: !Sub '${AWS::StackName}-GenerateExplanationFunction'
