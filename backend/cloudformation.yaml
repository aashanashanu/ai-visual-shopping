AWSTemplateFormatVersion: '2010-09-09'
Description: 'AI Visual Shopping - Multimodal Ecommerce with Amazon Nova and S3 Vector Storage'

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'prod', 'demo']
    Description: Environment name

Resources:
  # S3 Bucket for product images and vector storage
  ProductImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ai-shopping-catalog-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: ['GET', 'PUT', 'POST', 'DELETE', 'OPTIONS']
            AllowedOrigins: ['*']
            MaxAge: 3600
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      # Note: demo template tightened public access; remove public read BucketPolicy.

  # S3 Bucket for user uploads
  UserUploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ai-shopping-uploads-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: ['GET', 'PUT', 'POST', 'DELETE', 'OPTIONS']
            AllowedOrigins: ['*']
            MaxAge: 3600
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 7

  # IAM Role for Lambda functions
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ai-shopping-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - arn:aws:bedrock:*::foundation-model/amazon.nova-2-multimodal-embeddings-v1:0
                  - arn:aws:bedrock:*::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
                  - arn:aws:bedrock:*::foundation-model/amazon.nova-2-lite-v1:0
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProductImagesBucket}'
                  - !Sub 'arn:aws:s3:::${ProductImagesBucket}/*'
                  - !Sub 'arn:aws:s3:::${UserUploadsBucket}'
                  - !Sub 'arn:aws:s3:::${UserUploadsBucket}/*'

  # Lambda function for image search
  ImageSearchFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-shopping-image-search-${Environment}'
      Runtime: python3.11
      Handler: image_search.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60  # Increased timeout for embedding generation
      MemorySize: 512  # Demo-optimized memory
      Environment:
        Variables:
          PRODUCT_IMAGES_BUCKET: !Ref ProductImagesBucket
          USER_UPLOADS_BUCKET: !Ref UserUploadsBucket
          REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Image search function placeholder'
              }

  # Lambda function for generating explanations
  GenerateExplanationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-shopping-generate-explanation-${Environment}'
      Runtime: python3.11
      Handler: generate_explanation.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60  # Increased to allow for Bedrock retries (match demo)
      MemorySize: 512  # Demo-optimized memory
      Environment:
        Variables:
          REGION: !Ref AWS::Region
          EXPLANATION_MAX_TOKENS: "6000"
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Generate explanation function placeholder'
              }

  # API Gateway
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'ai-shopping-api-${Environment}'
      Description: 'API for AI Visual Shopping Application'

  # API Gateway Resources
  SearchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'search'

  ExplainResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'explain'

  # API Gateway Methods
  SearchMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref SearchResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ImageSearchFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
            method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
        - StatusCode: 400
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
            method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
        - StatusCode: 500
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
            method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"

  # Lambda function for seeding data
  SeedDataFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-shopping-demo-seed-data-${Environment}'
      Runtime: python3.11
      Handler: seed_data.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300  # Extended timeout for data seeding
      MemorySize: 1024  # Increased memory for seeding
      Environment:
        Variables:
          PRODUCT_IMAGES_BUCKET: !Ref ProductImagesBucket
          USER_UPLOADS_BUCKET: !Ref UserUploadsBucket
          REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Seed data function placeholder'
              }

  SearchOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref SearchResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent,X-Requested-With'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Max-Age: "'7200'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Max-Age: true

  ExplainMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ExplainResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GenerateExplanationFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
            method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
        - StatusCode: 400
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
            method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
        - StatusCode: 500
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
            method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"

  ExplainOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ExplainResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent,X-Requested-With'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Max-Age: "'7200'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Max-Age: true

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - SearchMethod
      - SearchOptionsMethod
      - ExplainMethod
      - ExplainOptionsMethod
    Properties:
      RestApiId: !Ref ApiGateway

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingRateLimit: 10  # requests per second
          ThrottlingBurstLimit: 20  # burst requests
        - ResourcePath: '/search'
          HttpMethod: 'POST'
          ThrottlingRateLimit: 5   # lower rate for expensive embedding calls
          ThrottlingBurstLimit: 10
        - ResourcePath: '/explain'
          HttpMethod: 'POST'
          ThrottlingRateLimit: 5   # lower rate for AI explanation calls
          ThrottlingBurstLimit: 10

  # Lambda API Gateway Permission
  ImageSearchApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ImageSearchFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/${Environment}/POST/search'

  GenerateExplanationApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GenerateExplanationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/${Environment}/POST/explain'

Outputs:
  ProductImagesBucketName:
    Description: 'S3 bucket for product images'
    Value: !Ref ProductImagesBucket
    Export:
      Name: !Sub '${AWS::StackName}-ProductImagesBucket'

  UserUploadsBucketName:
    Description: 'S3 bucket for user uploads'
    Value: !Ref UserUploadsBucket
    Export:
      Name: !Sub '${AWS::StackName}-UserUploadsBucket'

  ApiGatewayUrl:
    Description: 'API Gateway URL'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayUrl'

  ImageSearchFunctionName:
    Description: 'Image search Lambda function name'
    Value: !Ref ImageSearchFunction
    Export:
      Name: !Sub '${AWS::StackName}-ImageSearchFunction'

  GenerateExplanationFunctionName:
    Description: 'Generate explanation Lambda function name'
    Value: !Ref GenerateExplanationFunction
    Export:
      Name: !Sub '${AWS::StackName}-GenerateExplanationFunction'

  LambdaExecutionRole:
    Description: 'IAM role for Lambda functions'
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRole'

  CostOptimizationNote:
    Description: 'Cost optimization achieved by using S3-backed vector storage instead of OpenSearch'
    Value: 'Estimated monthly cost: $5-15 (vs $540+ with OpenSearch)'
